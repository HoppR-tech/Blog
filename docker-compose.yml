version: '3.8'

services:
  blog:
    image: ghcr.io/hoppr-tech/blog:latest
    build: .
    environment:
      - NUXT_PUBLIC_BASE_URL=https://blog.hoppr.tech
      - NITRO_PRESET=bun
      # Notion
      - NUXT_NOTION_DATABASE_POSTS_ID=cc3d5da28fc54ad982362d663b51e129
      # GitHub
      - NUXT_GITHUB_OWNER=HoppR-tech
      - NUXT_GITHUB_REPO=Blog
      - NUXT_GITHUB_BRANCH=main
      - NUXT_GITHUB_APP_ID=949437
      # Slack
      - NUXT_SLACK_CHANNEL_ID=C050VTWNVLK
    secrets:
      - source: blog-hoppr-prod-notion-api-key
        target: notion_api_key
      - source: blog-hoppr-prod-github-private-key
        target: github_private_key
      - source: blog-hoppr-prod-slack-bot-token
        target: slack_bot_token
    networks:
      - traefik-network
    volumes:
      # Persist the Nuxt Content runtime SQLite DB so it is not rebuilt from
      # Notion/GitHub on every restart (the cold-start sync is what caused the
      # 10s render timeouts). The DB is regenerable cache, so a per-node local
      # volume is acceptable. NOTE: replicas are spread across nodes and each
      # gets its own copy; should two land on the same node they share this
      # volume (SQLite WAL tolerates this for a read-mostly content cache).
      - blog-content-db:/usr/src/app/.output/server/.data
    healthcheck:
      # Readiness probe: /healthz verifies the content DB, not just that the
      # process serves a page. curl/wget are absent from the oven/bun image, so
      # probe via bun; AbortSignal keeps the fetch from hanging past the timeout.
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/healthz',{signal:AbortSignal.timeout(4000)}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 3
      placement:
        constraints:
          # Keep the blog off the dedicated CI runner node (label role=ci-runner).
          - node.labels.role != ci-runner
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: start-first
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-network
        - traefik.http.routers.blog.rule=Host(`blog.hoppr.tech`)
        - traefik.http.routers.blog.entrypoints=websecure
        - traefik.http.routers.blog.tls.certresolver=letsencrypt
        - traefik.http.services.blog.loadbalancer.server.port=3000
        # Compression gzip (blog-specific, does not affect other services)
        - traefik.http.middlewares.blog-compress.compress=true
        # Security + cache headers (blog-specific)
        - traefik.http.middlewares.blog-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff
        - traefik.http.middlewares.blog-headers.headers.customresponseheaders.X-Frame-Options=DENY
        - traefik.http.middlewares.blog-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin
        # Apply middlewares to blog router
        - traefik.http.routers.blog.middlewares=blog-compress,blog-headers

networks:
  traefik-network:
    external: true

volumes:
  blog-content-db:

secrets:
  blog-hoppr-prod-notion-api-key:
    external: true
  blog-hoppr-prod-github-private-key:
    external: true
  blog-hoppr-prod-slack-bot-token:
    external: true
